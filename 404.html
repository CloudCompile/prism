<!DOCTYPE html>
<html class="sl-theme-dark" lang="en">
  <head>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.7.0/jquery.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/js-cookie@3.0.5/dist/js.cookie.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.9.0/cdn/themes/dark.css" />
    <script type="module" src="https://cdn.jsdelivr.net/npm/@shoelace-style/shoelace@2.9.0/cdn/shoelace-autoloader.js"></script>
    <script src="/js/all.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/themes.js"></script>
    <link rel="stylesheet" href="/themes.css" />
    <link rel="stylesheet" href="/style.css" />
    <title>404 | Prism</title>
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta name="description" content="Page not found — head back to Prism to find your games." />
    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const dialog = document.querySelector('.dialog-width');
        const closeButton = dialog ? dialog.querySelector('sl-button[slot="footer"]') : null;
        if (dialog) setTimeout(() => dialog.show(), 200);
        if (closeButton) closeButton.addEventListener('click', () => dialog.hide());
      });
    </script>
  </head>
  <alerts>
    <sl-dialog label="Page not found!" class="dialog-width" style="--width: 60vw;">
      Oops! Looks like you found a page that doesn't exist. If you got here from normal site usage, please <a href="/suggest.html">report a bug</a>!
      <sl-button slot="footer" variant="neutral">Close</sl-button>
    </sl-dialog>
  </alerts>
  <body id="noscroll">
    <header>
      <a href="/index.html">Home</a>
      <a href="/bookmarklets.html">Bookmarklets</a>
      <a href="/projects.html">Games</a>
      <a href="/settings.html">Settings</a>
      <a id="blank" href="#">Open Blank</a>
      <a href="/about.html">About</a>
    </header>
    <main id="main" class="noscroll"></main>
    <footer class="noscroll">
      <a id="panicmode">Panic Mode</a>
      <a href="/transfer.html">Transfer your data</a>
      <a href="/suggest.html">Bug Reports</a>
      <a href="/suggest.html">Suggestions</a>
      <a href="/contact.html">Contact</a>
    </footer>
  </body>
</html>
